name: Update Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats card
        run: |
          curl -s -o README.assets/stats.svg \
            "https://github-readme-stats.vercel.app/api?username=Recoleta37&show_icons=true&theme=tokyonight&hide_border=true"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.assets/stats.svg
          git commit -m "Update stats card [skip ci]" || exit 0
          git push
